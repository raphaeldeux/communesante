# Variante pour déploiement avec Apache2 comme reverse proxy
# Apache2 écoute sur 80/443 et proxifie vers les ports locaux ci-dessous

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: communesante
      POSTGRES_USER: communesante
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U communesante"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://communesante:${POSTGRES_PASSWORD}@db:5432/communesante
      API_SECRET_TOKEN: ${API_SECRET_TOKEN}
      COMMUNE_INSEE: ${COMMUNE_INSEE:-44194}
      DGFIP_API_KEY: ${DGFIP_API_KEY:-}
      SYNC_CRON: ${SYNC_CRON:-0 3 * * 0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "127.0.0.1:8010:8000"   # exposé uniquement en local, proxifié par Apache2
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "127.0.0.1:3010:80"     # exposé uniquement en local, proxifié par Apache2
    networks:
      - internal
    restart: unless-stopped

volumes:
  pgdata:
  uploads:

networks:
  internal:
    driver: bridge
