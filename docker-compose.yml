services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: communesante
      POSTGRES_USER: communesante
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U communesante"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://communesante:${POSTGRES_PASSWORD}@db:5432/communesante
      API_SECRET_TOKEN: ${API_SECRET_TOKEN}
      COMMUNE_INSEE: ${COMMUNE_INSEE:-44194}
      DGFIP_API_KEY: ${DGFIP_API_KEY:-}
      SYNC_CRON: ${SYNC_CRON:-0 3 * * 0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  certs:

networks:
  internal:
    driver: bridge
