# /etc/apache2/sites-available/communesante.conf
# Configuration Apache2 pour CommuneSante
# Remplacez votre-domaine.fr par votre domaine réel

<VirtualHost *:80>
    ServerName votre-domaine.fr
    ServerAlias www.votre-domaine.fr

    # Redirection automatique vers HTTPS
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName votre-domaine.fr
    ServerAlias www.votre-domaine.fr

    # Certificats Let's Encrypt (générés par Certbot)
    SSLEngine On
    SSLCertificateFile    /etc/letsencrypt/live/votre-domaine.fr/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/votre-domaine.fr/privkey.pem

    # En-têtes de sécurité
    Header always set X-Frame-Options SAMEORIGIN
    Header always set X-Content-Type-Options nosniff
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # Proxy vers l'API backend (FastAPI)
    ProxyPreserveHost On
    ProxyPass        /api/ http://127.0.0.1:8000/
    ProxyPassReverse /api/ http://127.0.0.1:8000/

    # Proxy vers le frontend (React SPA)
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Support WebSocket (utile pour le dev / hot-reload)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:3000/$1" [P,L]

    # Logs
    ErrorLog  ${APACHE_LOG_DIR}/communesante_error.log
    CustomLog ${APACHE_LOG_DIR}/communesante_access.log combined
</VirtualHost>
