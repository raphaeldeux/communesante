# Directives Apache2 pour CommuneSante
# ======================================
# Ce fichier est une RÉFÉRENCE uniquement.
#
# Si vous utilisez ISPConfig :
#   → Copiez les directives ci-dessous dans :
#      ISPConfig → Sites → Votre site → Options → "Apache Directives"
#   → Ne pas utiliser ce fichier directement (ISPConfig gère ses propres VirtualHosts)
#
# Si vous n'utilisez PAS ISPConfig :
#   → Copiez ce fichier dans /etc/apache2/sites-available/communesante.conf
#   → Remplacez votre-domaine.fr par votre domaine
#   → Exécutez : a2ensite communesante && systemctl reload apache2
#   → Obtenez un certificat : certbot --apache -d votre-domaine.fr
# ======================================

# --- Directives à coller dans ISPConfig (champ "Apache Directives") ---

# Proxy vers l'API backend (FastAPI)
ProxyPreserveHost On
ProxyPass        /api/ http://127.0.0.1:8010/
ProxyPassReverse /api/ http://127.0.0.1:8010/

# Proxy vers le frontend (React SPA)
ProxyPass        / http://127.0.0.1:3010/
ProxyPassReverse / http://127.0.0.1:3010/

# Support WebSocket
RewriteEngine On
RewriteCond %{HTTP:Upgrade} websocket [NC]
RewriteCond %{HTTP:Connection} upgrade [NC]
RewriteRule ^/?(.*) "ws://127.0.0.1:3010/$1" [P,L]

# --- En-têtes de sécurité (optionnel, à ajouter si non gérés par ISPConfig) ---
Header always set X-Frame-Options SAMEORIGIN
Header always set X-Content-Type-Options nosniff
Header always set X-XSS-Protection "1; mode=block"
Header always set Referrer-Policy "strict-origin-when-cross-origin"


